name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Rust quality checks ────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p zkguard --all-targets -- -D warnings
      - run: cargo clippy -p zkguard --all-targets --features llm-guard -- -D warnings
      - run: cargo clippy -p zkguard --all-targets --features llm-proxy -- -D warnings
      - run: cargo clippy -p zkguard --all-targets --features vault-encrypt -- -D warnings

  # ── Rust tests (feature matrix) ────────────────────────────────────────────
  rust-test:
    name: rust / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: ""
          - name: serde
            flags: "--features serde"
          - name: llm-guard
            flags: "--features llm-guard"
          - name: llm-proxy
            flags: "--features llm-proxy"
          - name: vault-encrypt
            flags: "--features vault-encrypt"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zkguard ${{ matrix.flags }}

  # ── Python bindings ────────────────────────────────────────────────────────
  python-test:
    name: python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install maturin pytest
      - name: Build bindings
        run: cd bindings/python && maturin develop --features stark
      - name: Run tests
        run: cd bindings/python && pytest tests/ -v

  # ── LangChain integration ──────────────────────────────────────────────────
  langchain-test:
    name: langchain integration
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install maturin pytest
      - name: Build Python bindings
        run: cd bindings/python && maturin develop --features stark
      - name: Install LangChain integration
        run: cd integrations/langchain && pip install -e ".[dev]"
      - name: Run tests
        run: cd integrations/langchain && PYTHONPATH=. pytest tests/ -v

  # ── Cross-platform smoke test ──────────────────────────────────────────────
  cross-platform:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zkguard
      - run: cargo test -p zkguard --features llm-guard
